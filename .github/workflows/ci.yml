name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,api]"

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Mypy
        run: mypy src/ --ignore-missing-imports

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,api]"

      - name: Run tests
        run: pytest tests/ -v --tb=short --junitxml=report.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-py${{ matrix.python-version }}
          path: report.xml

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy model files for CI build check
        run: |
          mkdir -p outputs_xgboost data/features
          python3 -c "
          import pickle
          with open('outputs_xgboost/xgboost_best.pkl', 'wb') as f:
              pickle.dump({'model': None}, f)
          import pandas as pd
          pd.DataFrame({'col': [0]}).to_parquet('data/features/dataset.parquet')
          "

      - name: Build Docker image
        run: docker build -t traffic-estimator:ci .
