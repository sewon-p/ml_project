name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev,api]"

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Mypy
        run: mypy src/ --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev,api]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy model files for build
        run: |
          mkdir -p outputs_xgboost data/features
          python -c "
          import pickle, numpy as np, os
          # Dummy XGBoost model pickle
          with open('outputs_xgboost/xgboost_best.pkl', 'wb') as f:
              pickle.dump({'model': None}, f)
          # Dummy parquet (minimal)
          import struct
          # Create minimal valid parquet via pandas if available
          try:
              import pandas as pd
              pd.DataFrame({'col': [0]}).to_parquet('data/features/dataset.parquet')
          except ImportError:
              # Write empty file as fallback
              open('data/features/dataset.parquet', 'wb').close()
          "

      - name: Build Docker image
        run: docker build -t traffic-estimator:ci .
