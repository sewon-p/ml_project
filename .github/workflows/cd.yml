name: CD

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GCP_PROJECT: ml-traffic-project-489205
  GCP_REGION: asia-northeast3
  GCP_AR_REPO: traffic-estimator
  CLOUD_RUN_SERVICE: traffic-estimator
  CLOUD_RUN_CONSUMER: traffic-consumer
  CLOUD_SQL_INSTANCE: ml-traffic-project-489205:asia-northeast3:traffic-db

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download model artifacts from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p outputs_xgboost data/features
          gh release download ${{ github.event.release.tag_name }} \
            --pattern "xgboost_best.pkl" \
            --dir outputs_xgboost
          gh release download ${{ github.event.release.tag_name }} \
            --pattern "dataset.parquet" \
            --dir data/features

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-gcp:
    name: Deploy to GCP Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Pull from GHCR and push to Artifact Registry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Login to GHCR
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # Determine image tag from release
          TAG=${{ github.event.release.tag_name }}

          # Pull GHCR image (lowercase required by Docker)
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          GHCR_IMAGE="${IMAGE_LOWER}:${TAG#v}"
          docker pull "$GHCR_IMAGE"

          # Re-authenticate to Artifact Registry (GHCR login may override docker config)
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

          # Tag and push to GCP Artifact Registry
          GCP_IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.GCP_AR_REPO }}/api:${TAG}"
          GCP_IMAGE_LATEST="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.GCP_AR_REPO }}/api:latest"
          docker tag "$GHCR_IMAGE" "$GCP_IMAGE"
          docker tag "$GHCR_IMAGE" "$GCP_IMAGE_LATEST"
          docker push "$GCP_IMAGE"
          docker push "$GCP_IMAGE_LATEST"

          echo "gcp_image=${GCP_IMAGE}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image=${{ env.gcp_image }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --add-cloudsql-instances=${{ env.CLOUD_SQL_INSTANCE }} \
            --set-secrets=DATABASE_URL=database-url:latest \
            --set-env-vars=PUBSUB_PROJECT=${{ env.GCP_PROJECT }} \
            --allow-unauthenticated \
            --port=8000 \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2 \
            --project=${{ env.GCP_PROJECT }}

      - name: Deploy Consumer to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_CONSUMER }} \
            --image=${{ env.gcp_image }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --add-cloudsql-instances=${{ env.CLOUD_SQL_INSTANCE }} \
            --set-secrets=DATABASE_URL=database-url:latest \
            --set-env-vars=PUBSUB_PROJECT=${{ env.GCP_PROJECT }},CONFIG_PATH=configs/default.yaml \
            --command="python","-m","src.streaming.consumer" \
            --no-allow-unauthenticated \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=1 \
            --no-cpu-throttling \
            --project=${{ env.GCP_PROJECT }}

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT }} \
            --format="value(status.url)")
          echo "API URL: ${URL}"
          echo "Mobile: ${URL}/static/mobile.html"
          curl -sf "${URL}/health" | python3 -m json.tool
