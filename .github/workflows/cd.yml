name: CD

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to deploy, for example v0.2.0
        required: true
        type: string
      asset_release_tag:
        description: Optional asset bundle release tag override
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GH_REPO: ${{ github.repository }}
  GCP_PROJECT: ml-traffic-project-489205
  GCP_REGION: asia-northeast3
  GCP_AR_REPO: traffic-estimator
  CLOUD_RUN_SERVICE: traffic-estimator
  CLOUD_SQL_INSTANCE: ml-traffic-project-489205:asia-northeast3:traffic-db

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.release_tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"
          fi

      - name: Resolve asset bundle tag
        run: |
          set -a
          source deploy/asset_bundle.env
          set +a

          if [ -n "${{ inputs.asset_release_tag }}" ]; then
            ASSET_TAG="${{ inputs.asset_release_tag }}"
          else
            ASSET_TAG="$ASSET_RELEASE_TAG"
          fi

          echo "ASSET_RELEASE_TAG=${ASSET_TAG}" >> "$GITHUB_ENV"
          echo "MODEL_ASSET=${MODEL_ASSET}" >> "$GITHUB_ENV"
          echo "GIS_ASSET=${GIS_ASSET}" >> "$GITHUB_ENV"
          echo "Using asset bundle tag: ${ASSET_TAG}"

      - name: Download deployment assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p outputs_xgboost data/gis

          gh release view "${{ env.ASSET_RELEASE_TAG }}" \
            --repo "${{ env.GH_REPO }}" \
            --json assets \
            --jq '.assets[].name'

          gh release download "${{ env.ASSET_RELEASE_TAG }}" \
            --repo "${{ env.GH_REPO }}" \
            --pattern "${{ env.MODEL_ASSET }}" \
            --dir outputs_xgboost \
            --clobber

          gh release download "${{ env.ASSET_RELEASE_TAG }}" \
            --repo "${{ env.GH_REPO }}" \
            --pattern "${{ env.GIS_ASSET }}" \
            --dir data/gis \
            --clobber

          ls -lh outputs_xgboost/xgboost_best.pkl data/gis/seoul_links.geojson

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          TAG=${{ env.RELEASE_TAG }}

          # Build image
          docker build -t app .

          # GHCR tags (lowercase)
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          docker tag app "${IMAGE_LOWER}:${TAG#v}"
          docker tag app "${IMAGE_LOWER}:latest"
          docker push "${IMAGE_LOWER}:${TAG#v}"
          docker push "${IMAGE_LOWER}:latest"

          # GCP Artifact Registry tags
          GCP_IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.GCP_AR_REPO }}/api:${TAG}"
          GCP_IMAGE_LATEST="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.GCP_AR_REPO }}/api:latest"
          docker tag app "$GCP_IMAGE"
          docker tag app "$GCP_IMAGE_LATEST"
          docker push "$GCP_IMAGE"
          docker push "$GCP_IMAGE_LATEST"

          echo "gcp_image=${GCP_IMAGE}" >> "$GITHUB_ENV"

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image=${{ env.gcp_image }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --add-cloudsql-instances=${{ env.CLOUD_SQL_INSTANCE }} \
            --set-secrets=DATABASE_URL=database-url:latest \
            --set-env-vars=PUBSUB_PROJECT=${{ env.GCP_PROJECT }} \
            --allow-unauthenticated \
            --port=8000 \
            --memory=2Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2 \
            --project=${{ env.GCP_PROJECT }}

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT }} \
            --format="value(status.url)")
          echo "API URL: ${URL}"
          echo "Dashboard: ${URL}/dashboard"
          echo "ML Pipeline: ${URL}/ml-pipeline/"
          echo "Mobile: ${URL}/mobile"
          echo "Map: ${URL}/map"
          curl -sf "${URL}/health" | python3 -m json.tool
          curl -sfL "${URL}/dashboard" > /dev/null
          curl -sfL "${URL}/ml-pipeline/" > /dev/null
