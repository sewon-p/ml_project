name: CD

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to deploy, for example v0.2.0
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GCP_PROJECT: ml-traffic-project-489205
  GCP_REGION: asia-northeast3
  GCP_AR_REPO: traffic-estimator
  CLOUD_RUN_SERVICE: traffic-estimator
  CLOUD_SQL_INSTANCE: ml-traffic-project-489205:asia-northeast3:traffic-db

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.release_tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"
          fi

      - name: Download model artifacts from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p outputs_xgboost data/features
          gh release download "${{ env.RELEASE_TAG }}" \
            --pattern "xgboost_best.pkl" \
            --dir outputs_xgboost
          gh release download "${{ env.RELEASE_TAG }}" \
            --pattern "dataset.parquet" \
            --dir data/features

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          TAG=${{ env.RELEASE_TAG }}

          # Build image
          docker build -t app .

          # GHCR tags (lowercase)
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          docker tag app "${IMAGE_LOWER}:${TAG#v}"
          docker tag app "${IMAGE_LOWER}:latest"
          docker push "${IMAGE_LOWER}:${TAG#v}"
          docker push "${IMAGE_LOWER}:latest"

          # GCP Artifact Registry tags
          GCP_IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.GCP_AR_REPO }}/api:${TAG}"
          GCP_IMAGE_LATEST="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.GCP_AR_REPO }}/api:latest"
          docker tag app "$GCP_IMAGE"
          docker tag app "$GCP_IMAGE_LATEST"
          docker push "$GCP_IMAGE"
          docker push "$GCP_IMAGE_LATEST"

          echo "gcp_image=${GCP_IMAGE}" >> "$GITHUB_ENV"

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image=${{ env.gcp_image }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --add-cloudsql-instances=${{ env.CLOUD_SQL_INSTANCE }} \
            --set-secrets=DATABASE_URL=database-url:latest \
            --set-env-vars=PUBSUB_PROJECT=${{ env.GCP_PROJECT }} \
            --allow-unauthenticated \
            --port=8000 \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2 \
            --project=${{ env.GCP_PROJECT }}

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT }} \
            --format="value(status.url)")
          echo "API URL: ${URL}"
          echo "Dashboard: ${URL}/dashboard"
          echo "ML Pipeline: ${URL}/ml-pipeline/"
          echo "Mobile: ${URL}/mobile"
          echo "Map: ${URL}/map"
          curl -sf "${URL}/health" | python3 -m json.tool
          curl -sfI "${URL}/dashboard"
          curl -sfI "${URL}/ml-pipeline/"
