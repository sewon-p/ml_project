# Default configuration for single-probe traffic density/flow estimation.
# DL-primary: raw 6-channel time series → CNN1D/LSTM → density prediction.

seed: 42
output_dir: outputs/

simulation:
  sumo_binary: sumo  # or sumo-gui
  max_workers: 20
  network:
    # link_length: dynamic per scenario (speed_limit * 600 * 1.2)
    num_lanes:
      min: 1
      max: 3
    speed_limit_kmh: [50, 60, 80, 100]
  demand:
    per_lane_min_vehph: 200
    per_lane_max_vehph: 2200
  vehicle_types:
    truck_ratio:
      min: 0.05
      max: 0.25
    passenger:
      tau: {min: 0.8, max: 2.0}
      decel: {min: 3.0, max: 6.0}
      minGap: {min: 1.5, max: 3.5}
      speedFactor: {min: 0.85, max: 1.15}
      sigma: {min: 0.3, max: 0.7}
      accel: {min: 1.5, max: 3.5}
      length: 4.5
    truck:
      tau: {min: 1.0, max: 2.5}
      decel: {min: 2.0, max: 4.5}
      minGap: {min: 2.0, max: 5.0}
      speedFactor: {min: 0.75, max: 0.95}
      sigma: {min: 0.2, max: 0.6}
      accel: {min: 0.8, max: 2.0}
      length: 12.0
  warmup_time: 200  # FCD recording starts (200-300: probe selection, 300-600: trajectory)
  collect_time: 400  # FCD recording duration (total sim = 600s)
  num_probes: 5  # probes per scenario
  step_length: 1.0  # SUMO simulation step (seconds)
  scenarios_csv: data/scenarios.csv

features:
  config: configs/features/all_features.yaml

model:
  type: cnn1d  # cnn1d | lstm | xgboost | lightgbm | fd_baseline
  config: configs/models/cnn1d.yaml

training:
  target: density  # density | flow
  device: auto  # auto | cuda | mps | cpu
  n_splits: 5  # GroupKFold splits
  group_column: scenario_id
  test_ratio: 0.2
  val_ratio: 0.1
  batch_size: 128
  density_weighted: true  # upweight high-density samples
  num_workers: 4  # DataLoader workers
  max_epochs: 200
  early_stopping_patience: 20
  learning_rate: 0.001
  optimizer: adam
  scheduler:
    type: cosine
    T_max: 200

data:
  timeseries_path: data/features/timeseries.npz
  metadata_path: data/features/metadata.parquet
  tabular_path: data/features/dataset.parquet
  seq_len: 300  # pad/truncate sequences to this length

window_features:
  window_size: 30  # seconds per window (300s / 30 = 10 windows)

residual_correction:
  enabled: true           # true → ML predicts Δk/Δq residuals; false → direct prediction
  fd_model: underwood     # greenshields | greenberg | underwood | drake | multi_regime
  vehicle_length: 4.5     # passenger vehicle length (m)
  min_gap: 2.5            # passenger minGap (m)
  v_free_factor: 1.1      # v_free = speed_limit × factor

evaluation:
  metrics: [rmse, mae, mape, r2]
  state_classification:
    speed_thresholds:
      congested: 10.0    # m/s
      saturated: 20.0    # m/s
      # free: > 20.0 m/s
  shap:
    enabled: true
    max_samples: 500

api:
  host: 0.0.0.0
  port: 8000
  model_path: outputs_xgboost/xgboost_best.pkl

database:
  url: postgresql+asyncpg://traffic:traffic@localhost:5432/traffic

logging:
  level: INFO
  log_dir: logs/
  tensorboard_dir: runs/

gis:
  enabled: true
  source: seoul-gis
  road_links_path: data/gis/seoul_links.geojson
  link_id_property: link_id
  road_name_property: road_name
  max_match_distance_m: 40.0
  heading_weight_m: 15.0
